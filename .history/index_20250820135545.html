<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Socios Comerciales - T&C Group</title>
    <link rel="stylesheet" href="../CSS/styless.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header Component -->
    <div id="header-container"></div>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Dynamic content will be loaded here -->
    </main>

    <!-- Loading Overlay Component -->
    <div id="loading-container"></div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-compat-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-compat-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-compat-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-compat-storage.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/2.1.5/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="../firebase-config.js"></script>
    
    <!-- Form Handler Modules -->
    <script src="JS/form-handler/form-handler-core.js"></script>
    <script src="JS/form-handler/form-handler-documents.js"></script>
    <script src="JS/form-handler/form-handler-banking.js"></script>
    
    <!-- Main Scripts -->
    <script src="../JS/ocr-processor.js"></script>
    <script src="../JS/form-handler.js"></script>
    <script src="../JS/app.js"></script>
    <script src="../JS/page-loader.js"></script>

    <script>
        // Initialize page loader when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            window.pageLoader = new PageLoader();
            window.pageLoader.init();
        });
    </script>
</body>
</html>
